services:
  jekyll:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /srv/jekyll
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
      - ./certs:/usr/local/share/ca-certificates/local:ro

volumes:
  bundle_cache:
