approach:
  title: From membrane science to process impact
  lead: MS<sup>3</sup>L connects molecular-scale membrane design to scalable process performance in chemically demanding liquid systems.
  areas:
    - title: Molecular selectivity
      summary: Designing membranes and interfaces for challenging ion and organic-liquid separations.
    - title: Process integration
      summary: Linking membrane performance to practical recovery, purification, and recycle schemes.
    - title: Circular systems
      summary: Applying separation science to biorefinery, recycling, and energy-related resource loops.

