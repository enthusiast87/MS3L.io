introduction:
  title: Introduction
  overview:
    - Membrane-based Sustainable Separation Solutions Laboratory (MS<sup>3</sup>L) develops membrane-based technologies for energy-efficient ion and liquid separations in sustainable chemical processes, circular resource systems, and energy applications.
    - Our research integrates separation science, process design, and membrane engineering to build practical low-energy solutions for chemically demanding liquid systems.
  priorities:
    - Sustainable biorefinery and product recovery
    - Circular plastic and solvent systems
    - Resource recovery from complex liquid streams
    - Membrane-enabled energy and electrochemical separations
  principal_investigator:
    name: Jihoon Kim
    current_role: Senior Researcher (2021 - present)
    current_affiliation: Korea Research Institute of Chemical Technology (KRICT)
    previous_positions:
      - Postdoctoral Research Associate in Chemical Engineering (2018 - 2021), Imperial College London (Prof. Andrew G. Livingston)
      - MS-PhD in Energy Engineering (2012 - 2017), Hanyang University (Prof. Young Moo Lee)
      - BS in Chemical Engineering (2006 - 2008, 2010 - 2012), Hanyang University

projects:
  title: Current Research Projects
  lead: Ongoing national and institute-led projects migrated from the original MS<sup>3</sup>L website.
  items:
    - title: Development of demonstration technology for carbon-neutral chemical process with digital transformation
      summary: Carbon-neutral process demonstration project integrating CCU technologies with digital transformation workflows.
      trl: TRL 3 to 6
      period: 2024 - ongoing
      focus: Demonstration-scale digital operation and process integration
    - title: Development of advanced separation process for CCU
      summary: Advanced membrane and separation process development for CCU and carbon circulation systems.
      trl: TRL 3 to 7
      period: 2023 - ongoing
      focus: High-selectivity separation trains for CCU unit operations
    - title: Development of platform chemical production and demonstration through CO2 conversion with under-utilized biomass
      summary: Platform chemical production and pilot-scale demonstration based on under-utilized biomass and CO2 conversion.
      trl: TRL 3 to 4
      period: 2024 - ongoing
      focus: Biomass/CO2 conversion and downstream purification

experiences:
  title: Representative Experiences
  items:
