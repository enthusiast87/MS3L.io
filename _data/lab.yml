    - title: Technology transfer to Lotte Chemical
      summary: Continuous waste polystyrene catalytic depolymerization and separation.
      detail: 2022-07-11, 396,000 USD, 10% contribution.
    - title: Know-how consultancy to Evonik Industries
      summary: Roll-to-roll robust membrane fabrication and module preparation.
