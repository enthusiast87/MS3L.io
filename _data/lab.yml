hero:
  title: Membrane-based sustainable separation solutions for circular chemical processes, resource recovery, and energy systems.
  body: Membrane-based Sustainable Separation Solutions Laboratory (MS<sup>3</sup>L) develops membrane technologies for energy-efficient ion and liquid separations across biorefinery systems, plastic recycling, solvent management, resource recovery, and electrochemical applications. Our work integrates separation science, membrane engineering, and process design to build practical low-energy solutions.
  mission: We develop membrane-enabled, low-energy separation technologies for circular chemical processes, resource recovery, and sustainable energy applications.
