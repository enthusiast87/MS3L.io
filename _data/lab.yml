    - title: Principal Investigator
      summary: National Research Foundation of Korea Basic Science Research Program.
      detail: 2018-09 to 2019-08, developing an innovative and environmentally friendly spraying thin-film composite membrane for interactive separation in organic solvents, 30,000 USD.

