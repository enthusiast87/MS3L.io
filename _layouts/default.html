<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <a class="brand-title" href="{{ '/' | relative_url }}">MS³L</a>
          <div class="brand-subtitle">Membrane-based Sustainable Separation Solutions Laboratory</div>
        </div>

        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/introduction' | relative_url }}">Introduction</a>
          <a href="{{ '/members' | relative_url }}">Members</a>
          <a href="{{ '/projects' | relative_url }}">Projects</a>
          <a href="{{ '/publications' | relative_url }}">Publications</a>
          <a href="{{ '/patents' | relative_url }}">Patents</a>
          <a href="{{ '/news' | relative_url }}">News</a>
          <a href="{{ '/contacts' | relative_url }}">Contacts</a>
        </nav>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <strong>MS³L</strong><br>
          Membrane-based Sustainable Separation Solutions Laboratory
        </div>
        <div class="footer-right">
          GitHub Pages version of the lab website
        </div>
      </div>
    </footer>
  </body>
</html>
